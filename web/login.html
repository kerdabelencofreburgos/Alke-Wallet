 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body>
 <div class="container">
   <main>
    <section>
        <article>
            <header>
                <h1>Alke Wallet</h1>
               
            </header>
           <form action="#" method="post">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h4 class="card-title">Iniciar Sesión</h4>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label fw-bold" for="loginEmail">Correo Electrónico</label>
                <input class="form-control" type="email" name="email" id="loginEmail" maxlength="30" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold" for="loginPassword">Contraseña</label>
                <input class="form-control" type="password" name="password" id="loginPassword" required>
            </div>
            <button class="btn btn-primary w-100 mt-2" type="submit">Ingresar</button>
        </div>
    </div>
</form>
        <a href="menu.html" class="btn btn-link w-100 mt-2">Ir al Menú</a>
        </article>
    </section>
   </main>
  
</div>
