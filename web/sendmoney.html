<!DOCTYPE html>
<html lang="es-LA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet | Envíar Dinero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="container">
        <main>
            <h1>Alke Wallet</h1>
    <form action="#" method="get" class="card p-4 mt-4">
    <h2 class="mb-3">Enviar Dinero</h2>
    
   <div class="mb-3">
    <label for="destinatario" class="form-label">Destinatario</label>
    <input type="text" class="form-control" id="destinatario" placeholder="Escribe el nombre del contacto..." autocomplete="off">
    <ul id="listaSugerencias" class="list-group" style="position: absolute; z-index: 1000; width: 93%;"></ul>
</div>

    <div class="mb-3">
        <label for="monto" class="form-label">Monto a enviar</label>
        <input type="number" class="form-control" id="monto" placeholder="Ej: 1000" min="1" required>
    </div>

<button type="button" class="btn btn-success w-100" data-bs-toggle="modal" data-bs-target="#modalConfirmacion">
    Transferir</button>
</form>
<div class="modal fade" id="modalConfirmacion" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Confirmar Transferencia</h5>
      </div>
      <div class="modal-body">
        ¿Estás seguro de que deseas realizar esta transferencia?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
<button type="button" class="btn btn-primary" id="btnConfirmarTransferencia">Confirmar Envío</button>
      </div>
    </div>
  </div>
</div>
        </main>
    </div>
     <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/sendmoney.js"></script>
</body>
</html>
